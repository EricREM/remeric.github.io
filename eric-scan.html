<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact REM Finance</title>
    <style>
        * { box-sizing: border-box; margin:0; padding:0; }
        body { 
            font-family: Arial, sans-serif; 
            text-align: center; 
            padding: 60px 20px; 
            background: #f5f7fa;
        }
        .container { max-width: 400px; margin: 0 auto; }
        h2 {
            font-size: 26px;
            margin-bottom: 8px;
            color: #1a1a1a;
        }
        .slogan {
            font-size: 16px;
            color: #555;
            margin-bottom: 40px;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 20px;
            margin: 14px 0;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            color: white;
            cursor: pointer;
            text-decoration: none;
        }
        .btn-email { background: #0077cc; }
        .btn-sms { background: #25d366; }
        .btn-qr { background: #9333ea; } /* 二维码按钮颜色 */
        .btn:hover { opacity: 0.9; }

        /* 二维码弹窗样式 */
        .qr-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .qr-content {
            background: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }
        .qr-content img {
            width: 360px;
            height: 460px;
            margin-bottom: 15px;
        }
        .close-qr {
            background: #0077cc;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Contact REM Finance</h2>
        <p class="slogan">Supporting you to Reach Every Milestone</p>

        <a href="mailto:eric.liu@remfinance.co.nz?subject=Business Inquiry&body=Hi Eric,%0D%0A%0D%0AI would like to get in touch with you">
            <div class="btn btn-email">📩 Send Email</div>
        </a>
        <a href="sms:0275545535?body=Hi Eric,%0D%0A%0D%0AI would like to get in touch with you">
            <div class="btn btn-sms">📱 Send SMS</div>
        </a>
        <!-- 新增二维码按钮 -->
        <a href="javascript:void(0)" onclick="openQR()">
            <div class="btn btn-qr">🔍 添加微信</div>
        </a>
    </div>

    <!-- 二维码弹窗 -->
    <div class="qr-modal" id="qrModal">
        <div class="qr-content">
            <!-- 把这里换成你的二维码图片地址 -->
            <img src="static/images/ericbq.jpg" alt="QR Code">
            <br>
            <button class="close-qr" onclick="closeQR()">Close</button>
        </div>
    </div>

    <script>
        function openQR() {
            document.getElementById("qrModal").style.display = "flex";
        }
        function closeQR() {
            document.getElementById("qrModal").style.display = "none";
        }
    </script>
</body>
</html>
